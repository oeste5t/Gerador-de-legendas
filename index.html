<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Legendas - Wagner</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #00f2ff; /* Azul Elétrico solicitado */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.4rem;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
            color: #00f2ff;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 2px solid #00f2ff;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background-color: #00f2ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        #resultado {
            margin-top: 25px;
            padding: 18px;
            background: #111;
            border: 1px dashed #00f2ff;
            border-radius: 8px;
            white-space: pre-wrap; /* Mantém as quebras de linha */
            min-height: 200px;
            font-size: 1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gerador de Legendas</h1>

    <label for="tema">Tema do Vídeo:</label>
    <input type="text" id="tema" placeholder="Ex: disciplina inabalável...">

    <label for="cta-select">Estilo da Chamada (CTA):</label>
    <select id="cta-select">
        <option value="Peça para comentarem uma palavra-chave (Ex: Comente 'FOCO')">Palavra-chave (Engajamento)</option>
        <option value="Faça uma pergunta reflexiva para os seguidores">Pergunta de Reflexão</option>
        <option value="Diga para clicarem no link da Bio">Link na Bio (Vendas)</option>
        <option value="Peça para o seguidor salvar este post">Salvar Post</option>
    </select>

    <button id="btn-gerar">Gerar Legenda Dark</button>

    <label>Resultado:</label>
    <div id="resultado">Aguardando...</div>
</div>

<script>
    const API_KEY = "SUA_CHAVE_AQUI"; 

    document.getElementById('btn-gerar').addEventListener('click', async () => {
        const tema = document.getElementById('tema').value;
        const ctaInstrucao = document.getElementById('cta-select').value;
        const resultadoDiv = document.getElementById('resultado');

        if (!tema) {
            alert("Digite o tema!");
            return;
        }

        resultadoDiv.innerText = "Processando legenda...";

        // Prompt atualizado com Título Minúsculo e Espaço antes das #
        const promptSystem = `
            Atue como especialista em Copywriting para Instagram.
            Crie uma legenda sobre: ${tema}.
            
            REGRAS DE FORMATAÇÃO:
            1. TÍTULO: Um título curto em letras MINÚSCULAS (apenas a primeira letra da frase maiúscula).
            2. CORPO: 8 parágrafos pequenos e impactantes.
            3. CTA: ${ctaInstrucao}.
            4. ESPAÇAMENTO: Use UMA LINHA EM BRANCO entre:
               - O título e o primeiro parágrafo.
               - Cada um dos 8 parágrafos.
               - O último parágrafo e a CTA.
               - A CTA e as hashtags (isso é obrigatório).
            5. HASHTAGS: Termine com 6 hashtags.
            6. ESTILO: Profissional e direto.
        `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptSystem }] }]
                })
            });

            const data = await response.json();
            const textoFinal = data.candidates[0].content.parts[0].text;
            resultadoDiv.innerText = textoFinal;

        } catch (error) {
            resultadoDiv.innerText = "Erro na API. Verifique a chave.";
        }
    });

    // Registro do PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js');
        });
    }
</script>

</body>
</html>
