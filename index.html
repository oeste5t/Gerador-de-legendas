<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Legendas - Profissional</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #00f2ff; /* Azul Elétrico solicitado */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.4rem;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
            color: #00f2ff;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 2px solid #00f2ff;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: #00f2ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:active {
            transform: scale(0.98);
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            background: #111;
            border: 1px dashed #00f2ff;
            border-radius: 8px;
            white-space: pre-wrap; /* Essencial para manter os espaços dos 8 parágrafos */
            min-height: 150px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gerador de Legendas</h1>

    <label for="tema">Tema do Vídeo:</label>
    <input type="text" id="tema" placeholder="Ex: Disciplina e Foco...">

    <label for="cta-select">Estilo da Chamada (CTA):</label>
    <select id="cta-select">
        <option value="Crie uma CTA pedindo para comentar uma palavra-chave como 'FOCO' ou 'MENTE'">Palavra-chave (Engajamento)</option>
        <option value="Crie uma pergunta reflexiva para os seguidores responderem">Pergunta de Engajamento</option>
        <option value="Direcione o seguidor para clicar no link da bio para conhecer o Kriptum">Link na Bio (Vendas)</option>
        <option value="Peça para o seguidor salvar este post para revisar depois">Salvar Post</option>
    </select>

    <button id="btn-gerar">Gerar Legenda Dark</button>

    <label>Resultado:</label>
    <div id="resultado">Sua legenda aparecerá aqui...</div>
</div>

<script>
    document.getElementById('btn-gerar').addEventListener('click', async () => {
        const tema = document.getElementById('tema').value;
        const ctaInstrucao = document.getElementById('cta-select').value;
        const resultadoDiv = document.getElementById('resultado');

        if (!tema) {
            alert("Digite o tema do vídeo!");
            return;
        }

        resultadoDiv.innerText = "Gerando sua legenda profissional...";

        // Montagem do prompt com as regras de 8 parágrafos e espaçamento
        const promptSystem = `
            Atue como um especialista em Dark Edits e Copywriting.
            Crie uma legenda sobre: ${tema}.
            
            ESTRUTURA OBRIGATÓRIA:
            1. TÍTULO: Um título curto e impactante em letras MAIÚSCULAS no início.
            2. CONTEÚDO: Exatamente 8 parágrafos pequenos e motivacionais.
            3. ESPAÇAMENTO: Deve haver uma linha em branco (quebra dupla) entre o título, entre cada um dos 8 parágrafos, antes da CTA e antes das hashtags.
            4. CTA: ${ctaInstrucao}.
            5. HASHTAGS: Adicione 6 hashtags relevantes no final.
            6. ESTILO: Sem muitos emojis, tom profissional e de autoridade.
        `;

        try {
            // --- INSIRA SUA LÓGICA DE API EXISTENTE ABAIXO ---
            // Exemplo: const texto = await suaFuncaoChamadaApi(promptSystem);
            
            // resultadoDiv.innerText = texto;
            console.log("Prompt pronto para envio:", promptSystem);
            
        } catch (error) {
            resultadoDiv.innerText = "Erro ao gerar legenda. Tente novamente.";
            console.error(error);
        }
    });

    // Registro do PWA conforme verificado anteriormente
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA ativo com sucesso!'))
                .catch(err => console.log('Erro no PWA:', err));
        });
    }
</script>

</body>
</html>
